<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopEase - Multi-Vendor eCommerce</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navbar -->

  <nav class="navbar">
    <div class="nav-container container">
      <div class="logo">🛒 ShopEase</div>

```
  <ul class="nav-links">
    <li><a href="#" onclick="showPage('home')">Home</a></li>
    <li><a href="#" onclick="showPage('cart')">Cart (<span id="cart-count">0</span>)</a></li>
    <li><a href="#" onclick="showPage('wishlist')">Wishlist</a></li>
    <li><a href="#" onclick="showPage('orders')">Orders</a></li>
    <li><a href="#" onclick="showPage('dashboard')">Dashboard</a></li>
  </ul>

  <div id="auth-section" class="auth-buttons">
    <button class="btn btn-secondary" onclick="showPage('login')">Login</button>
    <button class="btn btn-primary" onclick="showPage('register')">Register</button>
  </div>

  <div id="user-section" class="role-info hidden">
    <span id="user-name"></span> (<span id="user-role"></span>)
    <button class="btn btn-danger" onclick="logoutUser()">Logout</button>
    <button id="theme-toggle" class="theme-toggle" onclick="toggleDarkMode()">🌙</button>
  </div>
</div>
```

  </nav>

  <!-- Home Page -->

  <div id="home-page" class="page">
    <div class="container">

```
  <!-- HERO SECTION -->
  <div class="hero">
    <h1>Find Your Perfect Products</h1>
    <p>Shop from trusted sellers at the best prices</p>
    <button class="btn btn-primary">Explore Now</button>
  </div>

  <!-- SEARCH -->
  <div class="search-container">
    <div class="search-bar">
      <input type="text" id="search-input" class="search-input" placeholder="Search products...">
      <button class="btn btn-primary" onclick="applyFilters()">Search</button>
    </div>

    <div class="filter-group">
      <input type="number" id="min-price" class="filter-input" placeholder="Min Price">
      <input type="number" id="max-price" class="filter-input" placeholder="Max Price">

      <select id="category-filter" class="filter-input">
        <option value="">All Categories</option>
        <option value="Electronics">Electronics</option>
        <option value="Clothing">Clothing</option>
        <option value="Books">Books</option>
      </select>

      <select id="sort-select" class="filter-input">
        <option value="price:asc">Price Low to High</option>
        <option value="price:desc">Price High to Low</option>
      </select>
    </div>
  </div>

  <div id="skeleton-products" class="products-grid" style="display:none;"></div>
  <div id="products-container" class="products-grid"></div>

</div>
```

  </div>

  <!-- Login Page -->

  <div id="login-page" class="page hidden">
    <div class="form-container">
      <h2>Login</h2>
      <form id="login-form">
        <input type="email" id="login-email" class="form-input" placeholder="Email" required>
        <input type="password" id="login-password" class="form-input" placeholder="Password" required>
        <button type="submit" class="btn btn-primary">Login</button>
      </form>
    </div>
  </div>

  <!-- Register Page -->

  <div id="register-page" class="page hidden">
    <div class="form-container">
      <h2>Create Account</h2>
      <form id="register-form">
        <input type="text" id="reg-name" class="form-input" placeholder="Name" required>
        <input type="email" id="reg-email" class="form-input" placeholder="Email" required>
        <input type="password" id="reg-password" class="form-input" placeholder="Password" required>

```
    <select id="reg-role" class="form-input">
      <option value="user">Customer</option>
      <option value="shopOwner">Shop Owner</option>
      <option value="staff">Admin</option>
    </select>

    <button type="submit" class="btn btn-primary">Register</button>
  </form>
</div>
```

  </div>

  <script src="script.js"></script>

</body>
</html>
